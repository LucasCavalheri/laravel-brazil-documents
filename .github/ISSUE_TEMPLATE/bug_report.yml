name: Bug Report
description: Report incorrect validation, formatting, or package behavior
title: "[1.0] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues first.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "1.0.1"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: PHP and Laravel versions
      placeholder: "PHP 8.3, Laravel 13.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Expected vs actual behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Code sample or minimal example
      render: php
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Config, locale, formatted input values, etc.
