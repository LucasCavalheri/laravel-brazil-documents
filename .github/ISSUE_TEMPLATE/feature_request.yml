name: Feature Request
description: Suggest a new document type or improvement
title: "[1.0] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](https://laravel-brazil-documents.lucascavalheri.com.br/roadmap) before opening a request.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: API shape, document type, or behavior you expect
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other packages or workarounds you tried
